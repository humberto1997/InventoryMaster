<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Inventario .NET</title>
    <style>
        input, select {
            padding: 8px;
            margin-right: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
        }

        body {
            font-family: sans-serif;
            margin: 40px;
            background: #f4f4f4;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        th, td {
            padding: 12px;
            border: 1px solid #ddd;
            text-align: left;
        }

        th {
            background: #0078d4;
            color: white;
        }

        .low-stock {
            color: red;
            font-weight: bold;
        }

        .form-group {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        /* Estilos de botones */
        button {
            cursor: pointer;
            border-radius: 4px;
            border: none;
            padding: 8px 15px;
        }

        .btn-sell {
            background: #ffc107;
            color: #212529;
            font-weight: bold;
            margin-right: 5px;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .btn-save {
            background: #28a745;
            color: white;
        }
    </style>
</head>
<body>
    <h1>Gestión de Inventario</h1>
    <div style="display: flex; gap: 20px; margin-bottom: 30px;">
        <div style="background: #0078d4; color: white; padding: 20px; border-radius: 8px; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="margin: 0; font-size: 1.2rem;">Total Unidades</h2>
            <p id="total-unidades" style="font-size: 2rem; font-weight: bold; margin: 10px 0 0 0;">0</p>
        </div>

        <div style="background: #28a745; color: white; padding: 20px; border-radius: 8px; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="margin: 0; font-size: 1.2rem;">Valor Total</h2>
            <p id="valor-inventario" style="font-size: 2rem; font-weight: bold; margin: 10px 0 0 0;">$0</p>
        </div>

        <div style="background: #dc3545; color: white; padding: 20px; border-radius: 8px; flex: 1; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
            <h2 style="margin: 0; font-size: 1.2rem;">Stock Crítico</h2>
            <p id="stock-critico" style="font-size: 2rem; font-weight: bold; margin: 10px 0 0 0;">0</p>
        </div>
    </div>
    <button onclick="cargarProductos()" style="margin-bottom: 15px;">🔄 Actualizar Lista</button>

    <div style="margin-bottom: 20px;">
        <input type="text" id="buscador" placeholder="🔍 Buscar por nombre de producto..."
               onkeyup="filtrarProductos()"
               style="width: 100%; max-width: 400px; padding: 10px; font-size: 16px; border: 2px solid #0078d4;">
    </div>

    <div class="form-group">
        <h3>Agregar Nuevo Producto</h3>
        <input type="text" id="nombre" placeholder="Nombre">
        <input type="number" id="precio" placeholder="Precio">
        <input type="number" id="stock" placeholder="Cantidad">
        <select id="categoriaId">
            <option value="" disabled selected>Categoría</option>
            <option value="1">Laptops</option>
            <option value="2">Teclados</option>
            <option value="3">Celulares</option>
        </select>
        <button class="btn-save" onclick="crearProducto()">Guardar Producto</button>
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Precio</th>
                <th>Stock</th>
                <th>Categoría</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-productos">
        </tbody>
    </table>

    <script>
        const API_URL = 'https://localhost:7041/api/Products';

        async function cargarProductos() {
            try {
                const response = await fetch(API_URL);
                const productos = await response.json();
                const tabla = document.getElementById('tabla-productos');
                tabla.innerHTML = '';

                productos.forEach(p => {
                    const fila = `
                                    <tr>
                                        <td>${p.id}</td>
                                        <td>${p.name}</td>
                                        <td>$${p.price}</td>
                                        <td style="color: ${p.stock <= 5 ? 'red' : 'black'}; font-weight: ${p.stock <= 5 ? 'bold' : 'normal'}">
                                            ${p.stock}
                                        </td>
                                        <td>${p.category ? p.category.name : 'Sin categoría'}</td>
                                        <td>
                                            <button class="btn-sell" onclick="venderProducto(${p.id}, ${p.stock})">
                                                💰 Vender 1
                                            </button>
                                            <button class="btn-delete" onclick="eliminarProducto(${p.id})">
                                                Eliminar
                                            </button>
                                        </td>
                                    </tr>
                                `;
                    tabla.innerHTML += fila;
                });
            } catch (e) { console.error("Error al cargar", e); }
        }

        // NUEVA FUNCIÓN: VENDER (Paso 4)
        async function venderProducto(id, stockActual) {
            if (stockActual <= 0) {
                alert("❌ ¡Error! No hay stock disponible para vender.");
                return;
            }

            try {
                // Llamamos a tu endpoint especial de venta
                const response = await fetch(`${API_URL}/sell/${id}`, {
                    method: 'POST'
                });

                if (response.ok) {
                    // Si la API responde bien, refrescamos la tabla
                    cargarProductos();
                } else {
                    alert("Error al procesar la venta.");
                }
            } catch (error) {
                console.error("Error en la venta:", error);
            }
        }

        async function crearProducto() {
            const nombre = document.getElementById('nombre').value.trim();
            const precio = document.getElementById('precio').value;
            const stock = document.getElementById('stock').value;
            const catId = document.getElementById('categoriaId').value;

            if (!nombre || precio <= 0 || stock < 0 || !catId) {
                alert("⚠️ Completa los campos correctamente.");
                return;
            }

            const nuevoProducto = {
                name: nombre,
                price: parseFloat(precio),
                stock: parseInt(stock),
                categoryId: parseInt(catId),
                description: ""
            };

            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(nuevoProducto)
            });

            if (response.ok) {
                alert("✅ Guardado");
                cargarProductos();
            }
        }

        async function eliminarProducto(id) {
            if (confirm("¿Eliminar producto?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                cargarProductos();
            }
        }

        async function venderProducto(id, stockActual) {
            if (stockActual <= 0) {
                alert("❌ ¡Error! No hay stock.");
                return;
            }

            try {
                const response = await fetch(`https://localhost:7041/api/Products/sell`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    // Le enviamos el ID en el cuerpo como espera tu DTO de Swagger
                    body: JSON.stringify({ productId: id, quantity: 1 })
                });

                if (response.ok) {
                    cargarProductos();
                } else {
                    const errorText = await response.text();
                    console.log("Código de error:", response.status);
                    console.log("Mensaje del servidor:", errorText);
                    alert("Error al procesar la venta. Revisa la consola (F12) ahora mismo.");
                }
            } catch (error) {
                console.error("Error de conexión:", error);
            }
        }

        function filtrarProductos() {
            // 1. Obtenemos el texto que el usuario escribió (en minúsculas)
            const textoBusqueda = document.getElementById('buscador').value.toLowerCase();

            // 2. Obtenemos todas las filas de la tabla (tbody)
            const filas = document.getElementById('tabla-productos').getElementsByTagName('tr');

            // 3. Recorremos cada fila
            for (let i = 0; i < filas.length; i++) {
                // La celda del nombre es la segunda (índice 1)
                const celdaNombre = filas[i].getElementsByTagName('td')[1];

                if (celdaNombre) {
                    const nombreProducto = celdaNombre.textContent || celdaNombre.innerText;

                    // 4. Si el nombre contiene lo que buscamos, mostramos la fila, si no, la ocultamos
                    if (nombreProducto.toLowerCase().indexOf(textoBusqueda) > -1) {
                        filas[i].style.display = "";
                    } else {
                        filas[i].style.display = "none";
                    }
                }
            }
        }
        async function cargarProductos() {
            try {
                const response = await fetch(API_URL);
                const productos = await response.json();
                const tabla = document.getElementById('tabla-productos');
                tabla.innerHTML = '';

                // Variables para el Dashboard
                let totalUnidades = 0;
                let valorTotal = 0;
                let criticos = 0;

                productos.forEach(p => {
                    // Sumamos para el Dashboard
                    totalUnidades += p.stock;
                    valorTotal += (p.price * p.stock);
                    if (p.stock <= 5) criticos++;

                    const fila = `
                <tr>
                    <td>${p.id}</td>
                    <td>${p.name}</td>
                    <td>$${p.price}</td>
                    <td style="color: ${p.stock <= 5 ? 'red' : 'black'}; font-weight: ${p.stock <= 5 ? 'bold' : 'normal'}">
                        ${p.stock}
                    </td>
                    <td>${p.category ? p.category.name : 'Sin categoría'}</td>
                    <td>
                        <button class="btn-sell" onclick="venderProducto(${p.id}, ${p.stock})">💰 Vender 1</button>
                        <button class="btn-delete" onclick="eliminarProducto(${p.id})">Eliminar</button>
                    </td>
                </tr>
            `;
                    tabla.innerHTML += fila;
                });

                // ACTUALIZAMOS EL DASHBOARD
                document.getElementById('total-unidades').innerText = totalUnidades;
                document.getElementById('valor-inventario').innerText = `$${valorTotal.toLocaleString()}`;
                document.getElementById('stock-critico').innerText = criticos;

            } catch (e) { console.error("Error al cargar", e); }
        }

        cargarProductos();
    </script>
</body>
</html>
