<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventario OS | Dark Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --accent: #8b5cf6; /* Violeta Neón */
            --accent-hover: #a78bfa;
            --text-bright: #f8fafc;
            --text-dim: #94a3b8;
            --danger: #f43f5e;
            --success: #10b981;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-main);
            color: var(--text-bright);
            margin: 0;
            padding: 40px;
            line-height: 1.6;
        }

        h1 {
            font-weight: 600;
            letter-spacing: -1px;
            margin-bottom: 40px;
        }

        /* Dashboard de Cristal */
        .dashboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .card {
            background: var(--bg-card);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid var(--border);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }

            .card::before {
                content: "";
                position: absolute;
                top: 0;
                left: 0;
                width: 4px;
                height: 100%;
                background: var(--accent);
            }

            .card h2 {
                color: var(--text-dim);
                font-size: 0.9rem;
                margin: 0;
                text-transform: uppercase;
            }

            .card p {
                font-size: 2.2rem;
                font-weight: 600;
                margin: 10px 0 0 0;
            }

            .card.critico::before {
                background: var(--danger);
            }

        /* Controles e Inputs */
        .search-container {
            margin-bottom: 30px;
        }

        input, select {
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            outline: none;
            transition: all 0.3s;
        }

            input:focus {
                border-color: var(--accent);
                box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.2);
            }

        .form-panel {
            background: rgba(30, 41, 59, 0.5);
            padding: 30px;
            border-radius: 20px;
            border: 1px dashed var(--border);
            margin-bottom: 40px;
        }

        /* Tabla Estilo Flotante */
        .table-wrap {
            background: var(--bg-card);
            border-radius: 20px;
            padding: 10px;
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            padding: 20px;
            color: var(--text-dim);
            font-size: 0.85rem;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.02);
        }

        tr:hover {
            background: rgba(255,255,255,0.02);
        }

        /* Botones Estilo "Cyber" */
        button {
            cursor: pointer;
            font-weight: 600;
            border-radius: 10px;
            padding: 10px 20px;
            border: none;
            transition: all 0.3s;
            font-family: inherit;
        }

        .btn-primary {
            background: var(--accent);
            color: white;
        }

            .btn-primary:hover {
                background: var(--accent-hover);
                transform: translateY(-2px);
            }

        .btn-action-sell {
            background: transparent;
            border: 1px solid var(--success);
            color: var(--success);
        }

            .btn-action-sell:hover {
                background: var(--success);
                color: white;
            }

        .btn-action-del {
            background: transparent;
            border: 1px solid var(--danger);
            color: var(--danger);
        }

            .btn-action-del:hover {
                background: var(--danger);
                color: white;
            }

        .status-pill {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <h1>Inventario <span style="color: var(--accent)">Dashboard</span></h1>

    <div class="dashboard">
        <div class="card">
            <h2>Stock Total</h2>
            <p id="total-unidades">0</p>
        </div>
        <div class="card">
            <h2>Capital Activo</h2>
            <p id="valor-inventario">$0</p>
        </div>
        <div class="card critico">
            <h2>Alertas de Stock</h2>
            <p id="stock-critico">0</p>
        </div>
    </div>

    <div class="search-container">
        <input type="text" id="buscador" onkeyup="filtrarProductos()" placeholder="Filtrar por nombre..." style="width: 100%; max-width: 400px;">
    </div>

    <div class="form-panel">
        <h3 style="margin-top: 0">Nuevo Registro</h3>
        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px;">
            <input type="text" id="nombre" placeholder="Nombre del producto">
            <input type="number" id="precio" placeholder="Precio ($)">
            <input type="number" id="stock" placeholder="Cantidad">
            <select id="categoriaId">
                <option value="" disabled selected>Categoría</option>
                <option value="1">Laptops</option>
                <option value="2">Teclados</option>
                <option value="3">Celulares</option>
            </select>
            <button class="btn-primary" onclick="crearProducto()">Añadir Item</button>
        </div>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>PRODUCTO</th>
                    <th>PRECIO</th>
                    <th>STOCK</th>
                    <th>CATEGORÍA</th>
                    <th>ACCIONES</th>
                </tr>
            </thead>
            <tbody id="tabla-productos"></tbody>
        </table>
    </div>

    <script>
        // Mantenemos tu lógica original de JS
        const API_URL = 'https://localhost:7041/api/Products';

        async function cargarProductos() {
            try {
                const response = await fetch(API_URL);
                const productos = await response.json();
                const tabla = document.getElementById('tabla-productos');
                tabla.innerHTML = '';

                let totalUnidades = 0; let valorTotal = 0; let criticos = 0;

                productos.forEach(p => {
                    totalUnidades += p.stock;
                    valorTotal += (p.price * p.stock);
                    if (p.stock <= 5) criticos++;

                    const stockStyle = p.stock <= 5
                        ? 'background: rgba(244, 63, 94, 0.1); color: var(--danger);'
                        : 'background: rgba(16, 185, 129, 0.1); color: var(--success);';

                    const fila = `
                            <tr>
                                <td style="font-weight: 600;">${p.name}</td>
                                <td>$${p.price.toLocaleString()}</td>
                                <td><span class="status-pill" style="${stockStyle}">${p.stock}</span></td>
                                <td><span style="color: var(--text-dim)">${p.category ? p.category.name : 'Varios'}</span></td>
                                <td>
                                    <button class="btn-action-sell" onclick="venderProducto(${p.id}, ${p.stock})">Venta</button>
                                    <button class="btn-action-del" onclick="eliminarProducto(${p.id})">Borrar</button>
                                </td>
                            </tr>`;
                    tabla.innerHTML += fila;
                });

                document.getElementById('total-unidades').innerText = totalUnidades;
                document.getElementById('valor-inventario').innerText = `$${valorTotal.toLocaleString()}`;
                document.getElementById('stock-critico').innerText = criticos;
            } catch (e) { console.error(e); }
        }

        async function crearProducto() {
            const nombre = document.getElementById('nombre').value;
            const precio = document.getElementById('precio').value;
            const stock = document.getElementById('stock').value;
            const catId = document.getElementById('categoriaId').value;

            if (!nombre || !precio || !stock || !catId) return alert("Faltan datos");

            await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name: nombre, price: parseFloat(precio), stock: parseInt(stock), categoryId: parseInt(catId), description: "" })
            });
            cargarProductos();
        }

        async function eliminarProducto(id) {
            if (confirm("¿Eliminar?")) {
                await fetch(`${API_URL}/${id}`, { method: 'DELETE' });
                cargarProductos();
            }
        }

        async function venderProducto(id, stockActual) {
            if (stockActual <= 0) return alert("Sin stock");
            await fetch(`${API_URL}/sell`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId: id, quantity: 1 })
            });
            cargarProductos();
        }

        function filtrarProductos() {
            const texto = document.getElementById('buscador').value.toLowerCase();
            const filas = document.querySelectorAll('#tabla-productos tr');
            filas.forEach(f => {
                const nombre = f.cells[0].innerText.toLowerCase();
                f.style.display = nombre.includes(texto) ? "" : "none";
            });
        }

        cargarProductos();
    </script>
</body>
</html>
